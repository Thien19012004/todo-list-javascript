name: CI-CD Pipeline

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    # 1. Cài đặt Helm
    - name: Set up Helm
      uses: azure/setup-helm@v3

    # 2. Đóng gói Chart (Sửa đường dẫn thành helm/todo-app)
    - name: Package Helm Chart
      run: |
        VERSION="0.1.${{ github.run_number }}"
        # Trỏ vào thư mục chứa file Chart.yaml của bạn
        helm package ./helm/todo-app --version $VERSION --app-version $VERSION
        echo "NEW_VERSION=$VERSION" >> $GITHUB_ENV

    # 3. Đẩy file lên JFrog
    - name: Upload to JFrog
      run: |
        # Đóng gói xong, chúng ta di chuyển file tgz ra thư mục gốc để tạo index phẳng
        # (Giả sử file tgz đang ở thư mục hiện tại sau lệnh helm package)
        
        # Tạo index ngay tại thư mục chứa file tgz (không trỏ vào thư mục con)
        helm repo index . --url https://jfrog.ddthien.id.vn/artifactory/helm-local
        
        # Upload file tgz
        curl -u ${{ secrets.JFROG_USER }}:${{ secrets.JFROG_PASS }} \
          -T todo-app-${{ env.NEW_VERSION }}.tgz \
          "https://jfrog.ddthien.id.vn/artifactory/helm-local/todo-app-${{ env.NEW_VERSION }}.tgz"
        
        # Upload file index.yaml đã được fix đường dẫn
        curl -u ${{ secrets.JFROG_USER }}:${{ secrets.JFROG_PASS }} \
          -T index.yaml \
          "https://jfrog.ddthien.id.vn/artifactory/helm-local/index.yaml"

    # 4. Cập nhật GitOps Repo
    - name: Update GitOps Repo
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git clone https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/Thien19012004/my-gitops-repo.git
        cd my-gitops-repo
        sed -i "s/version: .*/version: ${{ env.NEW_VERSION }}/" argocd-apps/appset-helm.yaml
        git add .
        git commit -m "Update todo-app to version ${{ env.NEW_VERSION }} [skip ci]"
        git push