name: CI-CD Pipeline

on:
  push:
    branches: [ "master" ] # Đã sửa theo nhánh của bạn

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    # 1. Cài đặt Helm
    - name: Set up Helm
      uses: azure/setup-helm@v3

    # 2. Đóng gói Chart
    - name: Package Helm Chart
      run: |
        VERSION="0.1.${{ github.run_number }}"
        # Package và ép file tgz nằm ngay tại thư mục gốc của Runner (.)
        # Lệnh này giúp xóa bỏ mọi tiền tố đường dẫn thư mục
        helm package ./helm/todo-app --version $VERSION --app-version $VERSION --destination .
        echo "NEW_VERSION=$VERSION" >> $GITHUB_ENV

    # 3. Chỉ đẩy file Chart lên JFrog (Bỏ hoàn toàn việc tạo index.yaml)
    - name: Upload to JFrog
      run: |
        curl -u ${{ secrets.JFROG_USER }}:${{ secrets.JFROG_PASS }} \
          -T todo-app-${{ env.NEW_VERSION }}.tgz \
          "https://jfrog.ddthien.id.vn/artifactory/helm-local/todo-app-${{ env.NEW_VERSION }}.tgz"

    # 4. Cập nhật GitOps Repo
    - name: Update GitOps Repo
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        
        # Clone repo GitOps bằng Token
        git clone https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/Thien19012004/my-gitops-repo.git
        cd my-gitops-repo
        
        # Sửa dòng version: thành version mới nhất
        sed -i "s/version: .*/version: ${{ env.NEW_VERSION }}/" argocd-apps/appset-helm.yaml
        
        git add .
        git commit -m "Update todo-app to version ${{ env.NEW_VERSION }} [skip ci]"
        git push